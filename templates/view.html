<!DOCTYPE html>
<html>
<head>
    <title>Student Records</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Student Records</h1>

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Mobile</th>
    <th>Course</th>
    <th>Branch</th>
    <th>Year</th>
    <th>Edit</th>
    <th>Delete</th>
</tr>

{% for student in students %}

<tr>
    <td>{{student[0]}}</td>
    <td>{{student[1]}}</td>
    <td>{{student[2]}}</td>
    <td>{{student[3]}}</td>
    <td>{{student[4]}}</td>
    <td>{{student[5]}}</td>
    <td>{{student[6]}}</td>

    <td>
<a href="/edit/{{student[0]}}">
Edit
</a>
</td>

<td>
<a href="/delete/{{student[0]}}">
Delete
</a>
</td>

{% endfor %}

</table>

<br>

<a href="/">
    <button>Back</button>
</a>

</body>
</html>
