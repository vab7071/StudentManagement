<!DOCTYPE html>
<html>
<head>
<title>Update Student</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Update Student Record</h2>

<form action="/update" method="POST">

<input type="hidden"
name="student_id"
value="{{student[0]}}">

<label>Student Name</label>
<input type="text"
name="student_name"
value="{{student[1]}}">

<label>Email</label>
<input type="email"
name="email"
value="{{student[2]}}">

<label>Mobile</label>
<input type="text"
name="mobile"
value="{{student[3]}}">

<label>Course</label>
<input type="text"
name="course"
value="{{student[4]}}">

<label>Branch</label>
<input type="text"
name="branch"
value="{{student[5]}}">

<label>Year</label>
<input type="number"
name="year"
value="{{student[6]}}">

<br><br>

<button type="submit">
Update Record
</button>

</form>

</div>

</body>
</html>
